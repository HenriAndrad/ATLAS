services:
  - type: web
    name: vision-translator-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DEEPL_API_KEY
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
